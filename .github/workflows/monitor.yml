name: Incident monitor

# No `schedule:` trigger here on purpose: GitHub documents that
# schedule-triggered runs are best-effort and get delayed/skipped under
# load, which was too unreliable for a 10-minute cadence. Instead, an
# external free scheduler (cron-job.org) calls the workflow_dispatch API
# below every 10 minutes — dispatch runs don't have that deprioritization
# and start promptly like any on-demand run. See README.md for setup.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: incident-monitor
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated state
        run: |
          if ! git diff --quiet -- seen.json bot_state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen.json bot_state.json
            git commit -m "Update seen items / bot state [skip ci]"
            git push
          fi
